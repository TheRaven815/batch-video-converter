services:
  app:
    container_name: batch-video-converter
    build:
      context: .
      dockerfile: Dockerfile
    # Default CMD (/app/entrypoint.sh) runs both API and worker together.
    # Override with one of the following to run them separately:
    #   command: uvicorn video_converter.api.main:app --host 0.0.0.0 --port 8765
    #   command: python -m video_converter.worker.main
    env_file:
      - .env
    ports:
      - "8765:8765"
    volumes:
      - ./data:${DATA_ROOT:-/data}
      # Add/remove media mount lines as needed.
      - ./media/movies:/media/movies:ro
      - ./media/series:/media/series:ro
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    restart: unless-stopped

  redis:
    container_name: batch-video-converter-redis
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped
