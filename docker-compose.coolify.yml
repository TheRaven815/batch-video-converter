services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn video_converter.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.coolify
    ports:
      - "7777:8000"
    volumes:
      - app-data:/data
      - "./data/media/movies:/media/movies:ro"
      - "./data/media/tv-series:/media/tv-series:ro"
      - "./data/media/downloads:/media/downloads:ro"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m video_converter.worker.main
    env_file:
      - .env.coolify
    volumes:
      - app-data:/data
      - "./data/media/movies:/media/movies:ro"
      - "./data/media/tv-series:/media/tv-series:ro"
      - "./data/media/downloads:/media/downloads:ro"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

volumes:
  app-data:
  redis-data:
